<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motos cua - Directorio Cúa</title>
    <style>
        :root { 
            --y: #ffcc00; 
            --b: #121212; 
            --card: #1e1e1e;
        }
        body { 
            background: var(--b); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 15px; 
        }
        header { 
            text-align: center; 
            padding: 20px 0; 
            border-bottom: 2px solid var(--y); 
            margin-bottom: 20px;
        }
        h1 { margin: 0; letter-spacing: 1px; }
        #search { 
            width: 100%; 
            padding: 15px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            background: #222; 
            color: white; 
            margin-bottom: 25px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        #search:focus {
            outline: 2px solid var(--y);
            border: none;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto;
        }
        .card { 
            background: var(--card); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #333; 
            transition: transform 0.3s;
        }
        .card:hover { transform: scale(1.02); }
        .card-img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            background: #2a2a2a;
        }
        .info { padding: 15px; }
        .name { color: var(--y); font-weight: bold; font-size: 1.3em; margin-bottom: 5px; }
        .route { color: #aaa; font-size: 0.95em; margin-bottom: 15px; display: flex; align-items: center; }
        .btn { 
            display: block; 
            text-align: center; 
            background: #25d366; 
            color: white; 
            text-decoration: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1.1em;
            transition: background 0.3s;
        }
        .btn:hover { background: #128c7e; }
        #loading { text-align: center; color: #666; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>MIKAROL <span style="color:white">MOTOS</span></h1>
        <p style="color: #888; font-size: 0.9em; margin-top: 5px;">Directorio de Confianza - Cúa, Miranda</p>
    </header>

    <input type="text" id="search" placeholder="¿A dónde vas? Busca tu ruta o zona..." onkeyup="filtrar()">

    <div id="loading">Cargando motorizados...</div>
    <div class="grid" id="contenedor"></div>

    <script>
        // URL de tu base de datos Firebase
        const API_URL = "https://motoweb-a6fdd-default-rtdb.firebaseio.com/motos.json";

        async function cargarMotos() {
            try {
                const res = await fetch(API_URL);
                const datos = await res.json();
                const contenedor = document.getElementById('contenedor');
                const loading = document.getElementById('loading');
                
                contenedor.innerHTML = "";

                if (datos) {
                    loading.style.display = "none";
                    // Firebase devuelve un objeto, recorremos sus propiedades
                    Object.keys(datos).forEach(id => {
                        const m = datos[id];
                        contenedor.innerHTML += `
                            <div class="card" data-info="${m.nombre} ${m.ruta}">
                                <img src="${m.foto || 'https://via.placeholder.com/300x200?text=Mikarol+Motos'}" 
                                     class="card-img" 
                                     onerror="this.src='https://via.placeholder.com/300x200?text=Mikarol+Motos'">
                                <div class="info">
                                    <div class="name">${m.nombre} <span style="color:#25d366; font-size: 0.7em;">✔</span></div>
                                    <div class="route">📍 ${m.ruta}</div>
                                    <a href="https://wa.me/58${m.telefono.trim()}?text=Hola,%20vi%20tu%20perfil%20en%20MikarolMotos.%20¿Estás%20disponible?" 
                                       class="btn" target="_blank">Pedir Carrera</a>
                                </div>
                            </div>`;
                    });
                } else {
                    loading.innerText = "No hay motorizados registrados en este momento.";
                }
            } catch (error) {
                console.error("Error cargando datos:", error);
                document.getElementById('loading').innerText = "Error al conectar con la base de datos.";
            }
        }

        function filtrar() {
            let busqueda = document.getElementById('search').value.toLowerCase();
            let tarjetas = document.getElementsByClassName('card');
            
            for (let t of tarjetas) {
                let info = t.getAttribute('data-info').toLowerCase();
                if (info.includes(busqueda)) {
                    t.style.display = "";
                } else {
                    t.style.display = "none";
                }
            }
        }

        // Iniciar carga al abrir la web
        cargarMotos();
    </script>
</body>
</html>
